experiments:
  - algorithm: sha256_bruteforce
    params:
      difficulties: [4, 5, 6]
      runs: 5
      seed: "test_seed"

  - algorithm: sha256_chain
    params:
      steps: [3, 5, 10]
      target_difficulty: [4, 5]
      runs: 5
      seed: "test_seed"

  - algorithm: sha256_chain_fixed_target
    params:
      steps: [3, 5, 10, 20]
      target_bits: [16, 18, 20]
      runs: 5
      seed: "test_seed"

  - algorithm: argon2
    params:
      memory_mb: [64, 128, 256]
      iterations: [1, 2, 3]
      lanes: [1, 2, 4]
      runs: 3
      seed: "test_seed"

  - algorithm: vdf_squaring
    params:
      steps: [1000, 5000, 10000]
      runs: 3
      seed: "test_seed"